<div class="pagination-container">
    <label for="rowsPerPage">Rows per page:</label>
    <input
      type="number"
      id="rowsPerPage"
      [(ngModel)]="rowsPerPage"
      min="1"
      (change)="updatePagination()"
    />
  
    <label for="rowsPerUser">Rows per user:</label>
    <input
      type="number"
      id="rowsPerUser"
      [(ngModel)]="rowsPerUser"
      min="1"
      (change)="updatePagination()"
    />
  
    <!-- Table -->
    <table class="table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Date</th>
          <th>Start</th>
          <th>End</th>
          <th>Map Provider</th>
        </tr>
      </thead>
      <tbody>
        <!-- Display rows for the current page -->
        <ng-container *ngFor="let user of paginatedData">
          <tr *ngFor="let location of user.filteredLocations; let i = index">
            <td *ngIf="i === 0" [attr.rowspan]="user.filteredLocations.length">
              {{ user.userName }}
            </td>
            <td>{{ user.date }}</td>
            <td>{{ location.startLocation }}</td>
            <td>{{ location.endLocation }}</td>
            <td>
              <span class="map-badge" [class.google]="location.maptype === 'GoogleMap'" [class.leaflet]="location.maptype === 'NormalMap'">
                {{ location.maptype === 'GoogleMap' ? 'Google Maps' : 'Leaflet' }}
              </span>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  
    <!-- Pagination Controls -->
    <div class="pagination-controls">
      <button [disabled]="currentPage === 1" (click)="previousPage()">Previous</button>
      <span>Page {{ currentPage }} of {{ totalPages }}</span>
      <button [disabled]="currentPage === totalPages" (click)="nextPage()">Next</button>
    </div>
  </div>
